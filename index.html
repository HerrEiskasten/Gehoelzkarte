<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Gehölzkarte – Türkenschanzpark & BOKU Wien</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:    #0e1318;
  --paper:  #f4f0e6;
  --moss:   #3a6645;
  --sage:   #6a9e72;
  --stone:  #8a8278;
  --rust:   #8b4a2a;
  --cream:  rgba(244,240,230,0.97);
  --shad:   rgba(14,19,24,0.16);
  --border: rgba(14,19,24,0.11);
}
html, body { height: 100%; background: var(--paper); color: var(--ink); font-family: 'DM Mono', monospace; overflow: hidden; }

/* ══ TOP BAR ══════════════════════════════════════════════ */
#bar {
  position: fixed; top: 0; left: 0; right: 0; height: 52px; z-index: 1100;
  background: var(--cream); border-bottom: 1.5px solid var(--border);
  box-shadow: 0 1px 14px var(--shad);
  display: flex; align-items: center; gap: 12px; padding: 0 16px;
}
.logo { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 19px; color: var(--moss); white-space: nowrap; letter-spacing: -0.3px; }
.sub  { font-size: 8px; color: var(--stone); letter-spacing: 2.5px; text-transform: uppercase; white-space: nowrap; }
.bar-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }

/* search */
#sbox { position: relative; width: 190px; flex-shrink: 0; }
#si {
  width: 100%; background: rgba(14,19,24,0.06);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 9px 5px 26px; color: var(--ink); font-size: 11px; font-family: 'DM Mono', monospace;
}
#si::placeholder { color: var(--stone); }
#si:focus { outline: none; border-color: var(--moss); background: rgba(58,102,69,0.05); }
.sico { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--stone); pointer-events: none; }
#sdrop {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--cream); border: 1px solid var(--border);
  border-radius: 8px; z-index: 3000; max-height: 210px; overflow-y: auto; display: none;
  box-shadow: 0 6px 24px var(--shad);
}
.sdi { padding: 7px 11px; cursor: pointer; border-bottom: 1px solid rgba(14,19,24,0.06); }
.sdi:hover { background: rgba(58,102,69,0.07); }
.sdi-l { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 13px; color: var(--ink); }
.sdi-d { font-size: 9px; color: var(--stone); margin-top: 1px; }

/* filter buttons */
.fb {
  background: transparent; border: 1px solid var(--border);
  color: var(--stone); border-radius: 5px; padding: 4px 10px;
  font-size: 9px; cursor: pointer; font-family: 'DM Mono', monospace;
  letter-spacing: 0.5px; text-transform: uppercase; transition: all .15s; white-space: nowrap;
}
.fb.on { background: var(--moss); border-color: var(--moss); color: #fff; }

#cnt { margin-left: auto; font-size: 9px; color: var(--stone); white-space: nowrap; flex-shrink: 0; }
#cnt b { color: var(--moss); }

/* ══ MAP ═══════════════════════════════════════════════════ */
#map { position: fixed; top: 52px; left: 0; right: 0; bottom: 0; z-index: 1; }
.leaflet-tile { filter: sepia(0.18) saturate(0.85) brightness(0.98); }
.leaflet-control-zoom a {
  background: var(--cream) !important; color: var(--ink) !important;
  border-color: var(--border) !important; font-family: 'DM Mono', monospace !important;
}
.leaflet-control-attribution {
  background: rgba(244,240,230,0.88) !important; color: var(--stone) !important; font-size: 8px !important;
}

/* ══ MARKER DOTS ═══════════════════════════════════════════ */
.td {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--moss);
  border: 1.5px solid rgba(255,255,255,0.9);
  cursor: pointer;
  transition: transform 0.12s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.25);
}
.td:hover { transform: scale(1.9); }
.td.sel {
  background: var(--rust); border-color: #fff;
  transform: scale(2.2);
  box-shadow: 0 0 0 3px rgba(139,74,42,0.25), 0 2px 8px rgba(0,0,0,0.3);
}

/* ══ DROPDOWN POPUP ════════════════════════════════════════ */
/* Override Leaflet popup completely */
.leaflet-popup-content-wrapper {
  background: transparent !important;
  border: none !important;
  border-radius: 0 !important;
  box-shadow: none !important;
  padding: 0 !important;
}
.leaflet-popup-tip-container { display: none !important; }
.leaflet-popup-content { margin: 0 !important; width: auto !important; }
.leaflet-popup-close-button { display: none !important; }

/* The actual dropdown card */
.dropdown-card {
  background: var(--cream);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 10px 40px rgba(14,19,24,0.22), 0 2px 8px rgba(14,19,24,0.1);
  width: 280px;
  font-family: 'DM Mono', monospace;
  overflow: hidden;
  animation: dropIn 0.2s cubic-bezier(0.4,0,0.2,1);
}
@keyframes dropIn {
  from { opacity: 0; transform: translateY(-8px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Arrow pointing down to the tree dot */
.dropdown-card::after {
  content: '';
  position: absolute;
  bottom: -9px; left: 50%; transform: translateX(-50%);
  border: 9px solid transparent;
  border-top-color: var(--cream);
  border-bottom: none;
  filter: drop-shadow(0 2px 2px rgba(14,19,24,0.08));
}
.dropdown-card::before {
  content: '';
  position: absolute;
  bottom: -11px; left: 50%; transform: translateX(-50%);
  border: 10px solid transparent;
  border-top-color: var(--border);
  border-bottom: none;
}

/* Card header */
.dc-head {
  padding: 13px 15px 10px;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.dc-src {
  font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--stone); margin-bottom: 3px;
}
.dc-latin {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: 19px; color: var(--ink); line-height: 1.2;
  padding-right: 28px;
}
.dc-de {
  font-family: 'Cormorant Garamond', serif; font-size: 13px;
  color: var(--moss); margin-top: 2px;
}
.dc-close {
  position: absolute; top: 10px; right: 10px;
  width: 24px; height: 24px; border-radius: 50%;
  background: rgba(14,19,24,0.07); border: none;
  cursor: pointer; font-size: 14px; color: var(--stone);
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.dc-close:hover { background: rgba(14,19,24,0.13); }

/* Photo area */
.dc-photo-wrap {
  position: relative; height: 130px; overflow: hidden;
  background: rgba(14,19,24,0.04);
  border-bottom: 1px solid var(--border);
}
.dc-photo { width: 100%; height: 100%; object-fit: cover; display: block; }
.dc-photo-loading {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  gap: 6px; flex-direction: column;
}
.dc-photo-loading span { font-size: 9px; color: var(--stone); letter-spacing: 1px; }
.dc-photo-src {
  position: absolute; bottom: 7px; right: 8px;
  background: rgba(14,19,24,0.58); border-radius: 3px;
  padding: 2px 6px; font-size: 7px; color: rgba(244,240,230,0.88);
}
.spinner {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid rgba(58,102,69,0.15);
  border-top-color: var(--moss);
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Info grid */
.dc-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 1px; background: var(--border);
  border-bottom: 1px solid var(--border);
}
.dc-cell {
  background: var(--cream); padding: 8px 11px;
}
.dc-cell-full {
  background: var(--cream); padding: 8px 11px;
  grid-column: 1 / -1; border-top: 1px solid var(--border);
}
.dc-label { font-size: 7px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--stone); margin-bottom: 2px; }
.dc-val   { font-size: 11px; color: var(--ink); }

/* Footer */
.dc-foot {
  padding: 8px 13px;
  display: flex; align-items: center; justify-content: space-between;
}
.dc-coord { font-size: 8px; color: var(--stone); }
.dc-wiki {
  font-size: 9px; color: var(--moss); text-decoration: none;
  border: 1px solid rgba(58,102,69,0.3); border-radius: 4px;
  padding: 3px 8px; transition: background .15s;
  letter-spacing: 0.3px;
}
.dc-wiki:hover { background: rgba(58,102,69,0.08); }

/* ══ STATUS BADGE ══════════════════════════════════════════ */
#status {
  position: fixed; bottom: 13px; left: 13px; z-index: 800;
  background: var(--cream); border: 1px solid var(--border);
  border-radius: 7px; padding: 5px 12px;
  display: flex; align-items: center; gap: 7px;
  box-shadow: 0 2px 12px var(--shad);
}
.pd { width: 6px; height: 6px; border-radius: 50%; background: var(--moss); animation: pa 2.2s infinite; flex-shrink: 0; }
@keyframes pa { 0%,100%{opacity:1} 50%{opacity:.2} }
#stxt { font-size: 8px; color: var(--stone); letter-spacing: 1px; text-transform: uppercase; }

/* ══ LOADER ════════════════════════════════════════════════ */
#loader {
  position: fixed; inset: 0; z-index: 9000; background: var(--paper);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
}
.lt { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 28px; color: var(--moss); }
.ls { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: var(--stone); }
.lbw { width: 200px; height: 1.5px; background: rgba(14,19,24,0.1); border-radius: 1px; overflow: hidden; margin-top: 4px; }
.lb  { height: 100%; width: 0%; background: var(--moss); border-radius: 1px; transition: width .35s; }
#lm  { font-size: 9px; color: var(--stone); letter-spacing: 1px; }
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="lt">Gehölzkarte</div>
  <div class="ls">Türkenschanzpark · BOKU Wien</div>
  <div class="lbw"><div class="lb" id="lb"></div></div>
  <div id="lm">Karte wird vorbereitet…</div>
</div>

<!-- TOP BAR -->
<div id="bar">
  <div>
    <div class="logo">Gehölzkarte</div>
    <div class="sub">Türkenschanzpark · BOKU Wien</div>
  </div>
  <div class="bar-sep"></div>
  <div id="sbox">
    <span class="sico">⌕</span>
    <input id="si" type="text" placeholder="Art suchen…" autocomplete="off"/>
    <div id="sdrop"></div>
  </div>
  <button class="fb on" data-f="Alle">Alle</button>
  <button class="fb" data-f="Laubbaum">Laubbaum</button>
  <button class="fb" data-f="Nadelbaum">Nadelbaum</button>
  <button class="fb" data-f="Strauch">Strauch</button>
  <div id="cnt">—</div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- STATUS -->
<div id="status"><div class="pd"></div><span id="stxt">Baumkataster wird geladen…</span></div>

<script>
// ════════════════════════════════════════════════
// MAP INIT
// ════════════════════════════════════════════════
const map = L.map('map', { center:[48.2330,16.3415], zoom:16, zoomControl:false });
L.control.zoom({ position:'bottomright' }).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'© <a href="https://osm.org">OpenStreetMap</a> · Baumkataster: Stadt Wien CC BY-SA 3.0 AT',
  maxZoom:20,
}).addTo(map);

// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
let allTrees = [], activeFilter = 'Alle';
const markerLayer = L.layerGroup().addTo(map);
const iCache = new Map();
let curPop = null;

const bar = (p,m) => {
  document.getElementById('lb').style.width = p+'%';
  document.getElementById('lm').textContent = m;
};

// ════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════
function parseArt(raw) {
  raw = (raw||'').trim();
  const m = raw.match(/^(.+?)\s*\((.+?)\)\s*$/);
  return m ? { latin:m[1].trim(), de:m[2].trim() } : { latin:raw, de:'—' };
}

const NADEL   = new Set(['Pinus','Picea','Abies','Larix','Taxus','Thuja','Juniperus',
  'Pseudotsuga','Cedrus','Chamaecyparis','Cupressus','Cryptomeria','Sequoia','Metasequoia','Ginkgo']);
const STRAUCH = new Set(['Corylus','Sambucus','Cornus','Viburnum','Ligustrum','Forsythia',
  'Syringa','Berberis','Buddleja','Cotoneaster','Euonymus','Lonicera','Crataegus','Spiraea','Ribes','Rosa']);

function classTyp(latin) {
  const g = (latin||'').split(' ')[0];
  return NADEL.has(g) ? 'Nadelbaum' : STRAUCH.has(g) ? 'Strauch' : 'Laubbaum';
}

// ════════════════════════════════════════════════
// DATA SOURCE 1 — Wiener Baumkataster WFS
// (data.wien.gv.at sends CORS headers from deployed domains)
// ════════════════════════════════════════════════
async function loadWFS() {
  const url = 'https://data.wien.gv.at/daten/geo?service=WFS&request=GetFeature'
    + '&version=1.1.0&typeName=ogdwien:BAUMKATOGD&srsName=EPSG:4326'
    + '&outputFormat=json&bbox=16.326,48.222,16.356,48.244';
  const r = await fetch(url);
  if (!r.ok) throw new Error('WFS ' + r.status);
  const j = await r.json();
  return (j.features||[]).map((f,i) => {
    const p = f.properties, c = f.geometry.coordinates;
    const a = parseArt(p.GATTUNG_ART||'');
    return {
      id: 'w'+(p.BAUM_ID||i), lat:c[1], lng:c[0],
      latin: a.latin, de: a.de, typ: classTyp(a.latin),
      stammumfang: p.STAMMUMFANG_TXT || '—',
      baumhoehe:   p.BAUMHOEHE_TXT   || '—',
      krone:       p.KRONENDURCHMESSER_TXT || '—',
      pflanzjahr:  p.PFLANZJAHR_TXT  || '—',
      strasse:     p.OBJEKT_STRASSE  || '—',
      quelle: 'Baumkataster Wien',
    };
  });
}

// ════════════════════════════════════════════════
// DATA SOURCE 2 — OpenStreetMap Overpass API
// (CORS-safe, always works from any browser)
// ════════════════════════════════════════════════
async function loadOverpass() {
  // Extended bbox: Türkenschanzpark + BOKU gardens + surrounding streets
  const bbox = '48.222,16.326,48.244,16.356';
  const q = `[out:json][timeout:40][bbox:${bbox}];
(
  node["natural"="tree"];
  node["ref:baumkataster"];
);
out body;`;
  const r = await fetch('https://overpass-api.de/api/interpreter', {
    method:'POST', body:'data='+encodeURIComponent(q),
  });
  if (!r.ok) throw new Error('Overpass ' + r.status);
  const j = await r.json();
  return (j.elements||[]).map(e => {
    const t = e.tags||{};
    const specLat = t['species']||t['taxon']||'';
    const specDe  = t['species:de']||t['taxon:de']||'';
    let latin = specLat || t['name'] || 'Unbekannte Art';
    let de    = specDe || '—';
    if (!specDe && specLat.includes('(')) { const p=parseArt(specLat); latin=p.latin; de=p.de; }
    return {
      id: 'o'+e.id, lat:e.lat, lng:e.lon,
      latin, de, typ: classTyp(latin),
      stammumfang: t['circumference'] ? Math.round(parseFloat(t['circumference'])*100)+' cm' : '—',
      baumhoehe:   t['height']||'—',
      krone:       t['diameter_crown'] ? t['diameter_crown']+' m' : '—',
      pflanzjahr:  t['start_date']||t['plant:start_date']||'—',
      strasse:     t['addr:street']||t['loc_name']||'—',
      quelle: t['ref:baumkataster'] ? 'Baumkataster Wien (via OSM)' : 'OpenStreetMap',
    };
  });
}

// ════════════════════════════════════════════════
// iNATURALIST PHOTO FETCH
// ════════════════════════════════════════════════
async function fetchINat(name) {
  if (iCache.has(name)) return iCache.get(name);
  try {
    const r = await fetch(`https://api.inaturalist.org/v1/taxa?q=${encodeURIComponent(name)}&rank=species&per_page=1`);
    const d = await r.json();
    if (d.results?.[0]) {
      const t = d.results[0];
      const res = { photo:t.default_photo?.medium_url||null, wiki:t.wikipedia_url||null };
      iCache.set(name, res); return res;
    }
  } catch(e) {}
  iCache.set(name, null); return null;
}

// ════════════════════════════════════════════════
// MARKERS
// ════════════════════════════════════════════════
function mkIcon(id) {
  const el = document.createElement('div');
  el.className = 'td'; el.dataset.id = id;
  return L.divIcon({ html:el, className:'', iconSize:[9,9], iconAnchor:[4,4] });
}

function renderAll(trees) {
  markerLayer.clearLayers();
  const shown = activeFilter==='Alle' ? trees : trees.filter(t=>t.typ===activeFilter);
  shown.forEach(tree => {
    const m = L.marker([tree.lat, tree.lng], { icon:mkIcon(tree.id) });
    m.on('click', () => openDropdown(tree));
    markerLayer.addLayer(m);
  });
  document.getElementById('cnt').innerHTML = `<b>${shown.length}</b> Gehölze`;
}

function renderFiltered(trees) {
  markerLayer.clearLayers();
  trees.forEach(tree => {
    const m = L.marker([tree.lat, tree.lng], { icon:mkIcon(tree.id) });
    m.on('click', () => openDropdown(tree));
    markerLayer.addLayer(m);
  });
  document.getElementById('cnt').innerHTML = `<b>${trees.length}</b> Gehölze`;
}

// ════════════════════════════════════════════════
// DROPDOWN POPUP
// ════════════════════════════════════════════════
function openDropdown(tree) {
  // Deselect old marker
  document.querySelectorAll('.td.sel').forEach(e => e.classList.remove('sel'));
  document.querySelector(`.td[data-id="${tree.id}"]`)?.classList.add('sel');

  // Close existing popup
  if (curPop) { map.closePopup(curPop); curPop = null; }

  const uid = tree.id.replace(/\W/g,'x');

  // Build the dropdown card HTML
  const cardHTML = `
    <div class="dropdown-card" id="dc-${uid}">

      <!-- HEADER -->
      <div class="dc-head">
        <div class="dc-src">${tree.quelle}</div>
        <div class="dc-latin">${tree.latin || '—'}</div>
        ${tree.de && tree.de !== '—' ? `<div class="dc-de">${tree.de}</div>` : ''}
        <button class="dc-close" id="close-${uid}">✕</button>
      </div>

      <!-- PHOTO -->
      <div class="dc-photo-wrap">
        <div class="dc-photo-loading" id="ph-${uid}">
          <div class="spinner"></div>
          <span>Foto wird geladen…</span>
        </div>
      </div>

      <!-- DATA GRID -->
      <div class="dc-grid">
        <div class="dc-cell">
          <div class="dc-label">Typ</div>
          <div class="dc-val">${tree.typ}</div>
        </div>
        <div class="dc-cell">
          <div class="dc-label">Stammumfang</div>
          <div class="dc-val">${tree.stammumfang}</div>
        </div>
        <div class="dc-cell">
          <div class="dc-label">Baumhöhe</div>
          <div class="dc-val">${tree.baumhoehe}</div>
        </div>
        <div class="dc-cell">
          <div class="dc-label">Kronendurchm.</div>
          <div class="dc-val">${tree.krone}</div>
        </div>
        <div class="dc-cell">
          <div class="dc-label">Pflanzjahr</div>
          <div class="dc-val">${tree.pflanzjahr}</div>
        </div>
        <div class="dc-cell">
          <div class="dc-label">Standort</div>
          <div class="dc-val" style="font-size:10px">${tree.strasse !== '—' ? tree.strasse : '—'}</div>
        </div>
      </div>

      <!-- FOOTER -->
      <div class="dc-foot">
        <span class="dc-coord">${tree.lat.toFixed(5)}° N &nbsp;${tree.lng.toFixed(5)}° E</span>
        <span id="wikilink-${uid}"></span>
      </div>

    </div>`;

  // Leaflet popup with offset so arrow points at dot
  const pop = L.popup({
    offset: L.point(0, -14),
    closeButton: false,
    autoPan: true,
    autoPanPadding: [20, 20],
    className: 'tree-popup',
  })
  .setContent(cardHTML)
  .setLatLng([tree.lat, tree.lng]);

  pop.on('remove', () => {
    document.querySelectorAll('.td.sel').forEach(e => e.classList.remove('sel'));
    curPop = null;
  });

  pop.openOn(map);
  curPop = pop;

  // Wire up close button after DOM insert
  setTimeout(() => {
    document.getElementById(`close-${uid}`)?.addEventListener('click', () => {
      map.closePopup(pop);
    });
  }, 30);

  // Async: load iNaturalist photo
  fetchINat(tree.latin).then(d => {
    const ph = document.getElementById(`ph-${uid}`);
    if (!ph) return;
    if (d?.photo) {
      ph.outerHTML = `
        <img class="dc-photo" src="${d.photo}" alt="${tree.latin}"/>
        <span class="dc-photo-src">© iNaturalist / CC</span>`;
    } else {
      ph.innerHTML = '<span style="font-size:9px;color:var(--stone)">Kein Foto verfügbar</span>';
    }
    // Add wiki link if available
    if (d?.wiki) {
      const wl = document.getElementById(`wikilink-${uid}`);
      if (wl) wl.innerHTML = `<a class="dc-wiki" href="${d.wiki}" target="_blank" rel="noreferrer">→ Wikipedia</a>`;
    }
  });
}

// ════════════════════════════════════════════════
// SEARCH
// ════════════════════════════════════════════════
const si    = document.getElementById('si');
const sdrop = document.getElementById('sdrop');

si.addEventListener('input', () => {
  const q = si.value.trim().toLowerCase();
  if (q.length > 0) {
    renderFiltered(allTrees.filter(t =>
      (t.latin||'').toLowerCase().includes(q) || (t.de||'').toLowerCase().includes(q)));
  } else {
    renderAll(allTrees);
  }

  if (q.length < 2) { sdrop.style.display='none'; return; }

  const seen = new Set();
  const hits = allTrees.filter(t => {
    const match = (t.latin||'').toLowerCase().includes(q) || (t.de||'').toLowerCase().includes(q);
    if (!match || seen.has(t.latin)) return false;
    seen.add(t.latin); return true;
  }).slice(0,9);

  if (!hits.length) { sdrop.style.display='none'; return; }

  sdrop.innerHTML = hits.map(t => `
    <div class="sdi" data-id="${t.id}">
      <div class="sdi-l">${t.latin}</div>
      ${t.de && t.de!=='—' ? `<div class="sdi-d">${t.de}</div>` : ''}
    </div>`).join('');
  sdrop.style.display = 'block';

  sdrop.querySelectorAll('.sdi').forEach(el => {
    el.addEventListener('click', () => {
      const tree = allTrees.find(t => t.id === el.dataset.id);
      if (!tree) return;
      map.flyTo([tree.lat, tree.lng], 18, { duration:0.8 });
      setTimeout(() => openDropdown(tree), 850);
      sdrop.style.display = 'none';
      si.value = tree.latin;
      renderAll(allTrees);
    });
  });
});

document.addEventListener('click', e => {
  if (!e.target.closest('#sbox')) sdrop.style.display = 'none';
});

// ════════════════════════════════════════════════
// FILTER BUTTONS
// ════════════════════════════════════════════════
document.querySelectorAll('.fb').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fb').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    activeFilter = btn.dataset.f;
    si.value = ''; sdrop.style.display = 'none';
    if (curPop) { map.closePopup(curPop); curPop = null; }
    renderAll(allTrees);
  });
});

// ════════════════════════════════════════════════
// INIT — try WFS first, fall back to Overpass
// ════════════════════════════════════════════════
async function init() {
  bar(10, 'Karte wird geladen…');
  await new Promise(r => setTimeout(r, 200));

  let trees = [], src = '';

  // ① WFS (richeste Daten: Stammumfang, Höhe, Pflanzjahr…)
  bar(25, 'Baumkataster Wien wird abgerufen…');
  try {
    trees = await loadWFS();
    if (trees.length > 0) {
      src = `Baumkataster Wien · ${trees.length} Bäume`;
      console.log('✓ WFS OK:', trees.length, 'Bäume');
    }
  } catch(e) {
    console.warn('WFS fehlgeschlagen:', e.message);
  }

  // ② Overpass fallback
  if (trees.length === 0) {
    bar(50, 'OpenStreetMap Overpass wird geladen…');
    try {
      trees = await loadOverpass();
      src = `OpenStreetMap · ${trees.length} Bäume`;
      console.log('✓ Overpass OK:', trees.length, 'Bäume');
    } catch(e2) {
      console.error('Beide Quellen fehlgeschlagen:', e2);
      src = 'Verbindungsfehler – bitte Seite neu laden';
    }
  }

  bar(85, 'Bäume werden eingezeichnet…');
  await new Promise(r => setTimeout(r, 80));

  allTrees = trees;
  renderAll(allTrees);
  document.getElementById('stxt').textContent = src;

  bar(100, 'Fertig!');
  await new Promise(r => setTimeout(r, 350));
  document.getElementById('loader').style.display = 'none';
}

init();
</script>

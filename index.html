<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Gehölzkarte – Türkenschanzpark & BOKU Wien</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:    #0e1318;
  --paper:  #f4f0e6;
  --moss:   #3a6645;
  --stone:  #8a8278;
  --rust:   #8b4a2a;
  --cream:  rgba(244,240,230,0.97);
  --shad:   rgba(14,19,24,0.16);
  --border: rgba(14,19,24,0.11);
  --gps:    #1a6fbf;
}
html, body { height: 100%; background: var(--paper); color: var(--ink); font-family: 'DM Mono', monospace; overflow: hidden; }

/* ══ TOP BAR ══════════════════════════════════════════════ */
#bar {
  position: fixed; top: 0; left: 0; right: 0; height: 52px; z-index: 1100;
  background: var(--cream); border-bottom: 1.5px solid var(--border);
  box-shadow: 0 1px 14px var(--shad);
  display: flex; align-items: center; gap: 11px; padding: 0 14px;
}
.logo { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 19px; color: var(--moss); white-space: nowrap; }
.sub  { font-size: 8px; color: var(--stone); letter-spacing: 2.5px; text-transform: uppercase; white-space: nowrap; }
.bar-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }

#sbox { position: relative; width: 185px; flex-shrink: 0; }
#si {
  width: 100%; background: rgba(14,19,24,0.06);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 9px 5px 25px; color: var(--ink); font-size: 11px; font-family: 'DM Mono', monospace;
}
#si::placeholder { color: var(--stone); }
#si:focus { outline: none; border-color: var(--moss); }
.sico { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--stone); pointer-events: none; }
#sdrop {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--cream); border: 1px solid var(--border);
  border-radius: 8px; z-index: 3000; max-height: 210px; overflow-y: auto; display: none;
  box-shadow: 0 6px 24px var(--shad);
}
.sdi { padding: 7px 11px; cursor: pointer; border-bottom: 1px solid rgba(14,19,24,0.06); }
.sdi:hover { background: rgba(58,102,69,0.07); }
.sdi-l { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 13px; color: var(--ink); }
.sdi-d { font-size: 9px; color: var(--stone); margin-top: 1px; }

.fb {
  background: transparent; border: 1px solid var(--border);
  color: var(--stone); border-radius: 5px; padding: 4px 10px;
  font-size: 9px; cursor: pointer; font-family: 'DM Mono', monospace;
  letter-spacing: 0.5px; text-transform: uppercase; transition: all .15s; white-space: nowrap;
}
.fb.on { background: var(--moss); border-color: var(--moss); color: #fff; }

/* GPS button in topbar */
#gps-btn {
  background: transparent; border: 1px solid var(--border);
  border-radius: 5px; padding: 4px 10px;
  font-size: 9px; cursor: pointer; font-family: 'DM Mono', monospace;
  letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--gps); display: flex; align-items: center; gap: 5px;
  transition: all .15s; white-space: nowrap; flex-shrink: 0;
}
#gps-btn.active { background: var(--gps); color: #fff; border-color: var(--gps); }
#gps-btn.searching { animation: gpsWait 1.2s infinite; }
@keyframes gpsWait { 0%,100%{opacity:1} 50%{opacity:.4} }
.gps-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

#cnt { margin-left: auto; font-size: 9px; color: var(--stone); white-space: nowrap; flex-shrink: 0; }
#cnt b { color: var(--moss); }

/* ══ MAP ═══════════════════════════════════════════════════ */
#map { position: fixed; top: 52px; left: 0; right: 0; bottom: 0; z-index: 1; }
.leaflet-tile { filter: sepia(0.18) saturate(0.85) brightness(0.98); }
.leaflet-control-zoom a { background: var(--cream) !important; color: var(--ink) !important; border-color: var(--border) !important; }
.leaflet-control-attribution { background: rgba(244,240,230,0.88) !important; color: var(--stone) !important; font-size: 8px !important; }

/* Grey-out outside boundary */
.bounds-overlay { fill: rgba(80,70,60,0.28); stroke: var(--moss); stroke-width: 2; stroke-dasharray: 6 3; fill-rule: evenodd; }

/* ══ MARKERS ═══════════════════════════════════════════════ */
.td {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--moss); border: 1.5px solid rgba(255,255,255,0.9);
  cursor: pointer; transition: transform 0.12s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.25);
}
.td:hover { transform: scale(1.9); }
.td.sel { background: var(--rust); border-color: #fff; transform: scale(2.2); box-shadow: 0 0 0 3px rgba(139,74,42,0.22); }
.td.proximity {
  background: var(--gps); border-color: #fff;
  transform: scale(2.0);
  box-shadow: 0 0 0 4px rgba(26,111,191,0.25), 0 0 0 8px rgba(26,111,191,0.12);
  animation: proxPulse 1.5s infinite;
}
@keyframes proxPulse {
  0%,100% { box-shadow: 0 0 0 4px rgba(26,111,191,0.25), 0 0 0 8px rgba(26,111,191,0.12); }
  50%     { box-shadow: 0 0 0 6px rgba(26,111,191,0.18), 0 0 0 12px rgba(26,111,191,0.06); }
}

/* GPS marker */
.gps-marker-dot {
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--gps); border: 3px solid #fff;
  box-shadow: 0 0 0 3px rgba(26,111,191,0.3), 0 2px 8px rgba(0,0,0,0.3);
  animation: gpsPulse 2s infinite;
}
@keyframes gpsPulse { 0%,100%{box-shadow:0 0 0 3px rgba(26,111,191,0.3),0 2px 8px rgba(0,0,0,0.3)} 50%{box-shadow:0 0 0 8px rgba(26,111,191,0.1),0 2px 8px rgba(0,0,0,0.3)} }

/* ══ DROPDOWN POPUP ════════════════════════════════════════ */
.leaflet-popup-content-wrapper {
  background: transparent !important; border: none !important;
  border-radius: 0 !important; box-shadow: none !important; padding: 0 !important;
}
.leaflet-popup-tip-container { display: none !important; }
.leaflet-popup-content { margin: 0 !important; width: auto !important; }
.leaflet-popup-close-button { display: none !important; }

.dc {
  background: var(--cream); border: 1.5px solid var(--border);
  border-radius: 12px; width: 280px;
  box-shadow: 0 10px 40px rgba(14,19,24,0.22), 0 2px 8px rgba(14,19,24,0.1);
  overflow: visible; position: relative;
  animation: dropIn 0.2s cubic-bezier(0.4,0,0.2,1);
  font-family: 'DM Mono', monospace;
}
@keyframes dropIn { from{opacity:0;transform:translateY(-8px) scale(0.97)} to{opacity:1;transform:none} }

/* Downward arrow */
.dc::after  { content:''; position:absolute; bottom:-9px; left:50%; transform:translateX(-50%); border:9px solid transparent; border-top-color:var(--cream); border-bottom:none; }
.dc::before { content:''; position:absolute; bottom:-11px; left:50%; transform:translateX(-50%); border:10px solid transparent; border-top-color:rgba(14,19,24,0.13); border-bottom:none; }

/* inner scroll container */
.dc-inner { overflow: hidden; border-radius: 10px; }

.dc-head { padding: 12px 14px 10px; border-bottom: 1px solid var(--border); position: relative; }
.dc-src   { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--stone); margin-bottom: 2px; }
.dc-lat   { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 19px; color: var(--ink); line-height: 1.2; padding-right: 26px; }
.dc-de    { font-family: 'Cormorant Garamond', serif; font-size: 13px; color: var(--moss); margin-top: 2px; }
.dc-close { position: absolute; top: 9px; right: 9px; width: 24px; height: 24px; border-radius: 50%; background: rgba(14,19,24,0.07); border: none; cursor: pointer; font-size: 14px; color: var(--stone); display: flex; align-items: center; justify-content: center; }
.dc-close:hover { background: rgba(14,19,24,0.14); }

/* Photo */
.dc-photo-wrap { height: 128px; overflow: hidden; background: rgba(14,19,24,0.04); border-bottom: 1px solid var(--border); position: relative; display: flex; align-items: center; justify-content: center; }
.dc-photo { width: 100%; height: 100%; object-fit: cover; display: block; }
.dc-photo-src { position: absolute; bottom: 6px; right: 7px; background: rgba(14,19,24,0.58); border-radius: 3px; padding: 2px 5px; font-size: 7px; color: rgba(244,240,230,0.88); }
.spinner { width: 20px; height: 20px; border-radius: 50%; border: 2px solid rgba(58,102,69,0.15); border-top-color: var(--moss); animation: spin 0.8s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.dc-nophoto { font-size: 9px; color: var(--stone); }

/* Merkmale block */
.dc-merkmale { padding: 10px 13px; border-bottom: 1px solid var(--border); }
.dc-m-label  { font-size: 7px; letter-spacing: 1.8px; text-transform: uppercase; color: var(--stone); margin-bottom: 5px; }
.dc-m-tags   { display: flex; flex-wrap: wrap; gap: 4px; }
.dc-m-tag    { background: rgba(58,102,69,0.1); border: 1px solid rgba(58,102,69,0.2); border-radius: 4px; padding: 3px 8px; font-size: 10px; color: var(--moss); font-family: 'Cormorant Garamond', serif; font-style: italic; letter-spacing: 0.2px; }
.dc-m-none   { font-size: 10px; color: var(--stone); font-style: italic; }

/* Footer */
.dc-foot { padding: 8px 13px; display: flex; align-items: center; justify-content: space-between; }
.dc-coord { font-size: 8px; color: var(--stone); }
.dc-wiki  { font-size: 9px; color: var(--moss); text-decoration: none; border: 1px solid rgba(58,102,69,0.3); border-radius: 4px; padding: 3px 8px; letter-spacing: 0.3px; }
.dc-wiki:hover { background: rgba(58,102,69,0.08); }

/* ══ GPS ACCURACY RING ════════════════════════════════════ */
.leaflet-gps-accuracy { stroke: var(--gps); stroke-width: 1.5; fill: rgba(26,111,191,0.08); }

/* ══ GPS STATUS TOAST ═════════════════════════════════════ */
#gps-toast {
  position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
  z-index: 2000; background: var(--cream); border: 1px solid var(--border);
  border-radius: 8px; padding: 7px 16px; font-size: 9px; color: var(--stone);
  letter-spacing: 0.8px; text-transform: uppercase;
  box-shadow: 0 2px 12px var(--shad); display: none; white-space: nowrap;
}
#gps-toast.visible { display: block; animation: toastIn .2s ease; }
@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(4px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

/* ══ STATUS BADGE ══════════════════════════════════════════ */
#status { position: fixed; bottom: 14px; left: 14px; z-index: 800; background: var(--cream); border: 1px solid var(--border); border-radius: 7px; padding: 5px 12px; display: flex; align-items: center; gap: 7px; box-shadow: 0 2px 12px var(--shad); }
.pd { width: 6px; height: 6px; border-radius: 50%; background: var(--moss); animation: pa 2.2s infinite; flex-shrink: 0; }
@keyframes pa { 0%,100%{opacity:1} 50%{opacity:.2} }
#stxt { font-size: 8px; color: var(--stone); letter-spacing: 1px; text-transform: uppercase; }

/* ══ LOADER ════════════════════════════════════════════════ */
#loader { position: fixed; inset: 0; z-index: 9000; background: var(--paper); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
.lt { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 28px; color: var(--moss); }
.ls { font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: var(--stone); }
.lbw { width: 200px; height: 1.5px; background: rgba(14,19,24,0.1); border-radius: 1px; overflow: hidden; margin-top: 4px; }
.lb  { height: 100%; width: 0%; background: var(--moss); transition: width .35s; }
#lm  { font-size: 9px; color: var(--stone); letter-spacing: 1px; }
</style>
</head>
<body>

<div id="loader">
  <div class="lt">Gehölzkarte</div>
  <div class="ls">Türkenschanzpark · BOKU Wien</div>
  <div class="lbw"><div class="lb" id="lb"></div></div>
  <div id="lm">Karte wird vorbereitet…</div>
</div>

<div id="bar">
  <div><div class="logo">Gehölzkarte</div><div class="sub">Türkenschanzpark · BOKU Wien</div></div>
  <div class="bar-sep"></div>
  <div id="sbox">
    <span class="sico">⌕</span>
    <input id="si" type="text" placeholder="Art suchen…" autocomplete="off"/>
    <div id="sdrop"></div>
  </div>
  <button class="fb on" data-f="Alle">Alle</button>
  <button class="fb" data-f="Laubbaum">Laubbaum</button>
  <button class="fb" data-f="Nadelbaum">Nadelbaum</button>
  <button class="fb" data-f="Strauch">Strauch</button>
  <div class="bar-sep"></div>
  <button id="gps-btn"><span class="gps-dot"></span>Standort</button>
  <div id="cnt">—</div>
</div>

<div id="map"></div>
<div id="gps-toast"></div>
<div id="status"><div class="pd"></div><span id="stxt">Baumkataster wird geladen…</span></div>

<script>
// ════════════════════════════════════════════════════════════
// BOUNDARY — prüfungsrelevantes Gebiet
// S: Sternwartstraße  W: Döblinger Friedhof (Ostrand = Borkowskigasse)
// E: Cottagegasse     N: Nedergasse
// ════════════════════════════════════════════════════════════
// Boundary quadrilateral — 4 corners (DMS converted to decimal):
// NW: 48°14'21.7"N 16°19'37.5"E
// NE: 48°14'18.7"N 16°20'37.3"E
// SE: 48°13'57.3"N 16°20'32.7"E
// SW: 48°13'58.5"N 16°19'41.9"E
const BOUNDARY_POLYGON = [
  [48.23936, 16.32708], // NW
  [48.23853, 16.34369], // NE
  [48.23258, 16.34242], // SE
  [48.23292, 16.32831], // SW
  [48.23936, 16.32708], // close polygon back to NW
];

// Bounding box for maxBounds (smallest rectangle covering all 4 corners + small margin)
const BOUNDS = {
  south: 48.2320,
  north: 48.2400,
  west:  16.3265,
  east:  16.3445,
};
const L_BOUNDS = L.latLngBounds(
  L.latLng(BOUNDS.south, BOUNDS.west),
  L.latLng(BOUNDS.north, BOUNDS.east)
);

// ════════════════════════════════════════════════════════════
// MAP INIT — locked to boundary
// ════════════════════════════════════════════════════════════
const map = L.map('map', {
  center: [48.2360, 16.3354],
  zoom: 17,
  zoomControl: false,
  maxBounds: L_BOUNDS,
  maxBoundsViscosity: 1.0,
  minZoom: 16,
  maxZoom: 24,                  // even deeper zoom — single-tree detail
  zoomSnap: 0.5,
  zoomDelta: 0.5,
  wheelPxPerZoomLevel: 80,
});
L.control.zoom({ position:'bottomright' }).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'© <a href="https://osm.org">OpenStreetMap</a> · Baumkataster: Stadt Wien CC BY-SA 3.0 AT',
  maxZoom: 24,
  maxNativeZoom: 19,
}).addTo(map);

// Grey overlay outside the L-shaped study area
const worldPoly = [[-90,-180],[-90,180],[90,180],[90,-180]];
L.polygon([worldPoly, BOUNDARY_POLYGON], {
  className:'bounds-overlay', interactive: false,
}).addTo(map);

// Dashed L-shaped boundary outline
L.polygon(BOUNDARY_POLYGON, {
  fill: false, color: '#3a6645', weight: 2.5,
  dashArray: '7 4', interactive: false, opacity: 0.7,
}).addTo(map);

// ════════════════════════════════════════════════════════════
// SPECIES TRAITS DATABASE
// 1–2 markante Merkmale pro Art (Gehölzkunde-relevant)
// ════════════════════════════════════════════════════════════
const TRAITS = {
  // Nadelbäume
  'Taxus baccata':             ['Zweihäusig', 'Gescheitelte Nadeln'],
  'Pinus sylvestris':          ['Zweinadelich', 'Orange-rote Borke oben'],
  'Pinus nigra':               ['Zweinadelich', 'Schwarze Borke'],
  'Picea abies':               ['Hängende Zapfen', 'Herablaufende Nadeln'],
  'Abies alba':                ['Stehende Zapfen', 'Silberweiße Nadelunterseite'],
  'Larix decidua':             ['Sommergrün', 'Weiche Büschel-Nadeln'],
  'Pseudotsuga menziesii':     ['Dreizähnige Braktee', 'Nadelabdruck oval'],
  'Thuja occidentalis':        ['Schuppenblätter flach', 'Aromatisch'],
  'Thuja plicata':             ['Schuppenblätter glänzend', 'Weiße X-Zeichnung unten'],
  'Chamaecyparis lawsoniana':  ['Hängende Triebspitzen', 'Schuppenblätter'],
  'Juniperus communis':        ['Stechende Nadeln', 'Blaue Beeren'],
  'Ginkgo biloba':             ['Fächerblatt, zweilappig', 'Zweihäusig'],
  'Cedrus libani':             ['Stehende Zapfen', 'Waagerechte Äste'],
  'Cedrus atlantica':          ['Aufrechte Äste', 'Blaugrüne Nadeln'],
  'Sequoiadendron giganteum':  ['Weiche Schuppenblätter', 'Rote Borke, weich'],
  'Metasequoia glyptostroboides': ['Sommergrün', 'Gegenständige Nadeln'],
  'Cryptomeria japonica':      ['Spiralförmige Schuppen', 'Weiche Nadeln'],
  // Laubbäume — Quercus
  'Quercus robur':             ['Gestielte Eicheln', 'Geöhrte Blattbasis'],
  'Quercus petraea':           ['Gestielte Blätter', 'Ungestielte Eicheln'],
  'Quercus pubescens':         ['Behaarte Blätter', 'Felshang-Standort'],
  'Quercus cerris':            ['Borstige Cupula', 'Fransige Knospen'],
  'Quercus rubra':             ['Spitze Blattlappen', 'Rote Herbstfärbung'],
  'Quercus palustris':         ['Tief eingeschnittene Lappen', 'Hängende Äste'],
  // Fagus / Buche
  'Fagus sylvatica':           ['Vielzähnige Knospen', 'Glatte Grauborke'],
  'Castanea sativa':           ['Lange gezähnte Blätter', 'Igelfrüchte'],
  // Acer / Ahorn
  'Acer platanoides':          ['Milchsaft im Blattstiel', 'Gegenständig'],
  'Acer pseudoplatanus':       ['Kein Milchsaft', 'Hängender Blütenstand'],
  'Acer campestre':            ['Milchsaft', 'Korkleisten an Zweigen'],
  'Acer saccharinum':          ['Silbrig-weißer Blattunterseite', 'Gegenständig'],
  'Acer negundo':              ['Gefiederte Blätter', 'Nur Ahorn mit gefiedertem Blatt'],
  // Tilia / Linde
  'Tilia cordata':             ['Kleine Blätter', 'Blaue Staubbeutel'],
  'Tilia platyphyllos':        ['Große Blätter behaart', 'Gelbe Staubbeutel'],
  'Tilia tomentosa':           ['Weißfilzige Blattunterseite', 'Silberlinde'],
  // Fraxinus / Esche
  'Fraxinus excelsior':        ['Schwarze Knospen', 'Gefiedertes Blatt'],
  'Fraxinus ornus':            ['Weiße Blüten', 'Graue Knospen'],
  // Platane
  'Platanus × acerifolia':     ['Abblätternde Borke', 'Stachelfrüchte'],
  'Platanus orientalis':       ['Tief eingeschnittene Blätter', 'Abblätternde Borke'],
  // Birke / Erle
  'Betula pendula':            ['Weiße Borke', 'Hängende Zweige'],
  'Betula pubescens':          ['Behaarte Zweige', 'Nicht hängend'],
  'Alnus glutinosa':           ['Klebrige Blätter', 'Zapfenähnliche Fruchtstände'],
  'Alnus incana':              ['Graubehaarte Blätter', 'Heller als A. glutinosa'],
  // Carpinus / Hainbuche
  'Carpinus betulus':          ['Doppelt gesägtes Blatt', 'Dreilappige Fruchtschuppe'],
  // Robinie / Gleditschie
  'Robinia pseudoacacia':      ['Zweidornig', 'Unpaarig gefiedert'],
  'Gleditsia triacanthos':     ['Dreizähnige Dornen', 'Lange Hülsenfrüchte'],
  // Rosskastanie
  'Aesculus hippocastanum':    ['Gefingert, 7-zählig', 'Stachelige Frucht'],
  'Aesculus × carnea':         ['Rote Blüten', 'Wenig stachelig'],
  // Linde verwandt / Ulme
  'Ulmus minor':               ['Schief-herzförmige Basis', 'Korkleisten möglich'],
  'Ulmus glabra':              ['Keine Korkleisten', 'Blatt oben rau'],
  // Prunus
  'Prunus avium':              ['Drüsen am Blattstiel', 'Glänzende Borke'],
  'Prunus padus':              ['Traubige Blüten', 'Unangenehmer Geruch Rinde'],
  'Prunus serotina':           ['Sägeähnlich gekerbt', 'Schwarze Früchte'],
  // Sorbus
  'Sorbus aucuparia':          ['Unpaarig gefiedert', 'Rote Vogelbeeren'],
  'Sorbus aria':               ['Weißfilzige Blattunterseite', 'Rote Früchte'],
  'Sorbus torminalis':         ['Ahornähnliche Blätter', 'Braune Früchte'],
  // Sonstige
  'Juglans regia':             ['Aromatisch', 'Fiederblatt 5–9 Blättchen'],
  'Populus tremula':           ['Flatterende Blätter', 'Graugrüne Borke'],
  'Populus alba':              ['Weißfilzige Blattunterseite', 'Weiße Borke'],
  'Populus nigra':             ['Dreiecksblatt', 'Schwarze Borke im Alter'],
  'Salix alba':                ['Silbrig behaarte Blätter', 'Lange schmal'],
  'Salix caprea':              ['Oval, runzelig', 'Weidenkätzchen früh'],
  'Liquidambar styraciflua':   ['Handförmig 5-lappig', 'Rote Herbstfärbung'],

};

function getTraits(latin) {
  if (!latin) return null;
  // Exact match
  for (const key of Object.keys(TRAITS)) {
    if (latin.toLowerCase().startsWith(key.toLowerCase())) return TRAITS[key];
  }
  // Genus match
  const genus = latin.split(' ')[0];
  return GENUS_TRAITS[genus] || null;
}

// GPS
// ════════════════════════════════════════════════════════════
let gpsMarker = null, gpsCircle = null, gpsActive = false, gpsWatchId = null;

function toast(msg, duration=3000) {
  const el = document.getElementById('gps-toast');
  el.textContent = msg; el.classList.add('visible');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('visible'), duration);
}

function setGpsBtn(state) {
  const btn = document.getElementById('gps-btn');
  btn.classList.remove('active','searching');
  if (state === 'active')    btn.classList.add('active');
  if (state === 'searching') btn.classList.add('searching');
}

function placeGpsMarker(lat, lng, accuracy) {
  const latlng = L.latLng(lat, lng);
  const dotEl = document.createElement('div');
  dotEl.className = 'gps-marker-dot';
  const icon = L.divIcon({ html:dotEl, className:'', iconSize:[16,16], iconAnchor:[8,8] });

  if (gpsMarker) gpsMarker.setLatLng(latlng);
  else { gpsMarker = L.marker(latlng, { icon, zIndexOffset:1000 }).addTo(map); }

  if (gpsCircle) gpsCircle.setLatLng(latlng).setRadius(accuracy);
  else { gpsCircle = L.circle(latlng, { radius:accuracy, className:'leaflet-gps-accuracy', interactive:false }).addTo(map); }

  // Highlight nearest tree
  highlightNearestTree(lat, lng, accuracy);
}

function highlightNearestTree(lat, lng, accuracy) {
  if (!allTrees.length) return;

  // Find nearest tree using haversine
  let nearest = null, nearestDist = Infinity;
  for (const t of allTrees) {
    const d = distMeters(lat, lng, t.lat, t.lng);
    if (d < nearestDist) { nearestDist = d; nearest = t; }
  }

  // Remove old proximity highlight
  document.querySelectorAll('.td.proximity').forEach(e => e.classList.remove('proximity'));

  // Only highlight if reasonably close (within 25m)
  if (nearest && nearestDist <= 25) {
    const dot = document.querySelector(`.td[data-id="${nearest.id}"]`);
    if (dot) dot.classList.add('proximity');
    // Show name in toast
    const dispName = nearest.de && nearest.de !== '—' ? `${nearest.de} (${nearest.latin})` : nearest.latin;
    toast(`▲ ${dispName} · ${Math.round(nearestDist)} m`, 4000);
  }
}

function distMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLng = (lng2-lng1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function removeGpsMarker() {
  if (gpsMarker) { map.removeLayer(gpsMarker); gpsMarker = null; }
  if (gpsCircle) { map.removeLayer(gpsCircle); gpsCircle = null; }
}

function toggleGPS() {
  if (!navigator.geolocation) { toast('GPS nicht verfügbar'); return; }

  if (gpsActive) {
    // Turn off
    gpsActive = false;
    if (gpsWatchId !== null) { navigator.geolocation.clearWatch(gpsWatchId); gpsWatchId = null; }
    removeGpsMarker();
    setGpsBtn('off');
    toast('Standort deaktiviert');
    return;
  }

  // Turn on
  gpsActive = true;
  setGpsBtn('searching');
  toast('Standort wird ermittelt…', 5000);

  gpsWatchId = navigator.geolocation.watchPosition(
    (pos) => {
      const { latitude:lat, longitude:lng, accuracy } = pos.coords;
      placeGpsMarker(lat, lng, accuracy);
      setGpsBtn('active');
      // On first fix: fly to location (only if inside bounds or nearby)
      if (!gpsMarker || !map.getBounds().contains([lat,lng])) {
        map.flyTo([lat, lng], 17, { duration:1 });
      }
      toast(`Genauigkeit ±${Math.round(accuracy)} m`, 2500);
    },
    (err) => {
      setGpsBtn('off');
      gpsActive = false;
      if (err.code === 1) toast('Standortzugriff verweigert');
      else if (err.code === 2) toast('Standort nicht verfügbar');
      else toast('GPS-Fehler');
    },
    { enableHighAccuracy:true, maximumAge:5000, timeout:15000 }
  );
}

document.getElementById('gps-btn').addEventListener('click', toggleGPS);

const setBar = (p,m) => {
  document.getElementById('lb').style.width = p+'%';
  document.getElementById('lm').textContent = m;
};

function parseArt(raw) {
  raw = (raw||'').trim();
  const m = raw.match(/^(.+?)\s*\((.+?)\)\s*$/);
  return m ? { latin:m[1].trim(), de:m[2].trim() } : { latin:raw, de:'—' };
}

const NADEL   = new Set(['Pinus','Picea','Abies','Larix','Taxus','Thuja','Juniperus',
  'Pseudotsuga','Cedrus','Chamaecyparis','Cupressus','Cryptomeria','Sequoia',
  'Sequoiadendron','Metasequoia','Ginkgo']);
const STRAUCH = new Set(['Corylus','Sambucus','Cornus','Viburnum','Ligustrum','Forsythia',
  'Syringa','Berberis','Buddleja','Cotoneaster','Euonymus','Lonicera','Crataegus','Spiraea','Ribes','Rosa']);

function classTyp(latin) {
  const g = (latin||'').split(' ')[0];
  return NADEL.has(g) ? 'Nadelbaum' : STRAUCH.has(g) ? 'Strauch' : 'Laubbaum';
}

// PHOTO FETCH — multi-source fallback chain
// 1. iNaturalist (best quality, scientifically curated)
// 2. Wikipedia API (article main image)
// 3. Wikimedia Commons (search by species name)
// ════════════════════════════════════════════════════════════
const iCache = new Map();

async function fetchINat(name) {
  if (iCache.has(name)) return iCache.get(name);

  let result = null;

  // Try multiple search variants for better hit rate
  const searchVariants = [
    name,                                // exact: "Acer platanoides 'Globosum'"
    name.replace(/'[^']+'/g, '').trim(), // strip cultivar: "Acer platanoides"
    name.split(' ').slice(0, 2).join(' '),// genus + species only
    name.split(' ')[0],                  // genus only
  ].filter((v, i, arr) => v && arr.indexOf(v) === i);

  // ── Source 1: iNaturalist ──
  for (const variant of searchVariants) {
    try {
      const r = await fetch(`https://api.inaturalist.org/v1/taxa?q=${encodeURIComponent(variant)}&rank=species,genus&per_page=1`);
      const d = await r.json();
      if (d.results?.[0]?.default_photo?.medium_url) {
        const t = d.results[0];
        result = {
          photo: t.default_photo.medium_url,
          wiki: t.wikipedia_url || null,
          source: 'iNaturalist',
        };
        break;
      }
    } catch(e) {}
  }

  // ── Source 2: Wikipedia main image ──
  if (!result) {
    for (const variant of searchVariants) {
      try {
        const r = await fetch(`https://de.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(variant)}?redirect=true`);
        const d = await r.json();
        if (d.thumbnail?.source) {
          result = {
            photo: d.thumbnail.source.replace(/\/\d+px-/, '/400px-'),
            wiki: d.content_urls?.desktop?.page || null,
            source: 'Wikipedia',
          };
          break;
        }
      } catch(e) {}
      // Also try English Wikipedia
      try {
        const r = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(variant)}?redirect=true`);
        const d = await r.json();
        if (d.thumbnail?.source) {
          result = {
            photo: d.thumbnail.source.replace(/\/\d+px-/, '/400px-'),
            wiki: d.content_urls?.desktop?.page || null,
            source: 'Wikipedia',
          };
          break;
        }
      } catch(e) {}
    }
  }

  // ── Source 3: Wikimedia Commons search ──
  if (!result) {
    for (const variant of searchVariants) {
      try {
        const r = await fetch(`https://commons.wikimedia.org/w/api.php?action=query&format=json&origin=*&generator=search&gsrsearch=${encodeURIComponent(variant)}&gsrnamespace=6&gsrlimit=1&prop=imageinfo&iiprop=url&iiurlwidth=400`);
        const d = await r.json();
        const pages = d?.query?.pages;
        if (pages) {
          const firstPage = Object.values(pages)[0];
          const url = firstPage?.imageinfo?.[0]?.thumburl || firstPage?.imageinfo?.[0]?.url;
          if (url && /\.(jpg|jpeg|png|webp)$/i.test(url)) {
            result = { photo: url, wiki: null, source: 'Wikimedia' };
            break;
          }
        }
      } catch(e) {}
    }
  }

  iCache.set(name, result);
  return result;
}

let allTrees=[], activeFilter='Alle', curPop=null;
const markerLayer = L.layerGroup().addTo(map);

function mkIcon(id) {
  const el=document.createElement('div');
  el.className='td'; el.dataset.id=id;
  return L.divIcon({ html:el, className:'', iconSize:[9,9], iconAnchor:[4,4] });
}

function renderAll(trees) {
  markerLayer.clearLayers();
  const shown = activeFilter==='Alle' ? trees : trees.filter(t=>t.typ===activeFilter);
  shown.forEach(tree => {
    const m=L.marker([tree.lat,tree.lng], { icon:mkIcon(tree.id) });
    m.on('click',()=>openDropdown(tree));
    markerLayer.addLayer(m);
  });
  document.getElementById('cnt').innerHTML = `<b>${shown.length}</b> Gehölze`;
}

function renderFiltered(trees) {
  markerLayer.clearLayers();
  trees.forEach(tree => {
    const m=L.marker([tree.lat,tree.lng], { icon:mkIcon(tree.id) });
    m.on('click',()=>openDropdown(tree));
    markerLayer.addLayer(m);
  });
  document.getElementById('cnt').innerHTML = `<b>${trees.length}</b> Gehölze`;
}

// ════════════════════════════════════════════════════════════
// DROPDOWN POPUP
// ════════════════════════════════════════════════════════════
function openDropdown(tree) {
  document.querySelectorAll('.td.sel').forEach(e=>e.classList.remove('sel'));
  document.querySelector(`.td[data-id="${tree.id}"]`)?.classList.add('sel');
  if (curPop) { map.closePopup(curPop); curPop=null; }

  const uid = tree.id.replace(/\W/g,'x');
  const traits = getTraits(tree.latin);

  // Build merkmale section
  let merkmaleHTML;
  if (traits && traits.length > 0) {
    const tags = traits.map(m=>`<span class="dc-m-tag">${m}</span>`).join('');
    merkmaleHTML = `<div class="dc-merkmale">
      <div class="dc-m-label">Markante Merkmale</div>
      <div class="dc-m-tags">${tags}</div>
    </div>`;
  } else {
    merkmaleHTML = `<div class="dc-merkmale">
      <div class="dc-m-label">Markante Merkmale</div>
      <div class="dc-m-none">Keine Daten vorhanden</div>
    </div>`;
  }

  const cardHTML = `<div class="dc">
    <div class="dc-inner">
      <div class="dc-head">
        <div class="dc-src">${tree.quelle}</div>
        <div class="dc-lat">${tree.latin||'—'}</div>
        ${tree.de&&tree.de!=='—'?`<div class="dc-de">${tree.de}</div>`:''}
        <button class="dc-close" id="cl-${uid}">✕</button>
      </div>
      <div class="dc-photo-wrap" id="pw-${uid}">
        <div class="spinner"></div>
      </div>
      ${merkmaleHTML}
      <div class="dc-foot">
        <span class="dc-coord">
          ${tree.baum_id && tree.baum_id !== '—'
            ? `Baum-ID <b style="color:var(--moss);font-family:'DM Mono',monospace">${tree.baum_id}</b>`
            : `Nr. <b style="color:var(--moss);font-family:'DM Mono',monospace">${tree.baumnummer || '—'}</b>`}
        </span>
        <span id="wl-${uid}"></span>
      </div>
    </div>
  </div>`;

  const pop = L.popup({ offset:L.point(0,-14), closeButton:false, autoPan:true, autoPanPadding:[20,20] })
    .setContent(cardHTML).setLatLng([tree.lat,tree.lng]);
  pop.on('remove',()=>{ document.querySelectorAll('.td.sel').forEach(e=>e.classList.remove('sel')); curPop=null; });
  pop.openOn(map); curPop=pop;

  setTimeout(()=>{ document.getElementById(`cl-${uid}`)?.addEventListener('click',()=>map.closePopup(pop)); },30);

  // Async photo
  fetchINat(tree.latin).then(d => {
    const pw = document.getElementById(`pw-${uid}`);
    if (!pw) return;
    if (d?.photo) {
      const srcLabel = d.source ? `© ${d.source}` : '© Foto';
      pw.innerHTML = `<img class="dc-photo" src="${d.photo}" alt="${tree.latin}"/><span class="dc-photo-src">${srcLabel}</span>`;
    } else {
      pw.innerHTML = `<span class="dc-nophoto">Kein Foto verfügbar</span>`;
    }
    if (d?.wiki) {
      const wl=document.getElementById(`wl-${uid}`);
      if (wl) wl.innerHTML=`<a class="dc-wiki" href="${d.wiki}" target="_blank">→ Wikipedia</a>`;
    }
  });
}

// ════════════════════════════════════════════════════════════
// SEARCH
// ════════════════════════════════════════════════════════════
const si=document.getElementById('si'), sdrop=document.getElementById('sdrop');
si.addEventListener('input',()=>{
  const q=si.value.trim().toLowerCase();
  if (q.length>0) renderFiltered(allTrees.filter(t=>(t.latin||'').toLowerCase().includes(q)||(t.de||'').toLowerCase().includes(q)));
  else renderAll(allTrees);
  if (q.length<2){sdrop.style.display='none';return}
  const seen=new Set();
  const hits=allTrees.filter(t=>{
    const ok=((t.latin||'').toLowerCase().includes(q)||(t.de||'').toLowerCase().includes(q))&&!seen.has(t.latin);
    if(ok)seen.add(t.latin);return ok;
  }).slice(0,9);
  if(!hits.length){sdrop.style.display='none';return}
  sdrop.innerHTML=hits.map(t=>`<div class="sdi" data-id="${t.id}">
    <div class="sdi-l">${t.latin}</div>
    ${t.de&&t.de!=='—'?`<div class="sdi-d">${t.de}</div>`:''}
  </div>`).join('');
  sdrop.style.display='block';
  sdrop.querySelectorAll('.sdi').forEach(el=>{
    el.addEventListener('click',()=>{
      const tree=allTrees.find(t=>t.id===el.dataset.id);
      if(!tree)return;
      map.flyTo([tree.lat,tree.lng],18,{duration:.8});
      setTimeout(()=>openDropdown(tree),850);
      sdrop.style.display='none'; si.value=tree.latin; renderAll(allTrees);
    });
  });
});
document.addEventListener('click',e=>{if(!e.target.closest('#sbox'))sdrop.style.display='none';});

document.querySelectorAll('.fb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on'); activeFilter=btn.dataset.f;
    si.value=''; sdrop.style.display='none';
    if(curPop){map.closePopup(curPop);curPop=null;}
    renderAll(allTrees);
  });
});

// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════
async function init() {
  setBar(15,'Baumdaten werden geladen…');
  await new Promise(r=>setTimeout(r,150));

  setBar(50,'Bäume werden verarbeitet…');
  const trees = await loadEmbedded();

  setBar(80,'Bäume werden eingezeichnet…');
  await new Promise(r=>setTimeout(r,80));
  allTrees = trees;
  renderAll(allTrees);
  document.getElementById('stxt').textContent = `Baumkataster Wien · ${trees.length} Bäume`;

  setBar(100,'Fertig!');
  await new Promise(r=>setTimeout(r,300));
  document.getElementById('loader').style.display='none';
}
init();
</script>
</body>
</html>
